name: agion
description: "Agion — Personal Ascension System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: any

  # Local persistence
  hive: any
  hive_flutter: any

  # Animations
  rive: any

  # Fonts
  google_fonts: any

  # Utilities
  equatable: any
  uuid: any
  intl: any

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  hive_generator: any
  build_runner: any

flutter:
  uses-material-design: true

  assets:
    - assets/foods/
    - assets/rive/
    - assets/lottie/

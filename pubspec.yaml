name: agion
description: "Agion — Personal Ascension System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: any

  # Local persistence
  hive: any
  hive_flutter: any
  shared_preferences: any

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  google_sign_in: any

  # Network
  connectivity_plus: any

  # Animations (flutter_animate = Google Stitch-compatible animation layer)
  flutter_animate: any
  lottie: any
  rive: any

  # Charts
  fl_chart: any

  # Audio
  audioplayers: any
  flutter_tts: any

  # Notifications
  flutter_local_notifications: any

  # Fonts
  google_fonts: any

  # Utilities
  equatable: any
  uuid: any
  intl: any

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  hive_generator: any
  build_runner: any

flutter:
  uses-material-design: true

  assets:
    - assets/foods/
    - assets/rive/
    - assets/lottie/
    - assets/audio/
    - assets/animations/
